<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — Brij Mohan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090f; --bg2: #0d1117; --bg3: #131922;
      --gold: #c9a84c; --gold-dim: #8a6e2f;
      --text: #e8e6e0; --text-dim: #8a8880; --text-faint: #3a3835;
      --border: #1e2530; --radius: 4px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; font-weight: 300; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(7,9,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.15em; text-decoration: none; }
    .nav-back { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; color: var(--text-dim); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
    .nav-back:hover { color: var(--gold); }

    .placeholder {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      gap: 1.5rem;
    }
    .placeholder-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold);
    }
    .placeholder-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--text);
    }
    .placeholder-sub {
      font-size: 1rem; color: var(--text-dim);
      max-width: 420px;
    }
    .btn {
      display: inline-block; padding: 0.65rem 1.5rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; border-radius: var(--radius);
      transition: all 0.2s;
    }
    .btn-secondary { border: 1px solid var(--gold-dim); color: var(--gold); background: transparent; }
    .btn-secondary:hover { background: var(--gold); color: var(--bg); }

    footer {
      text-align: center; padding: 2rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      color: var(--text-faint); border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">BRIJ MOHAN</a>
    <a href="/blog/" class="nav-back">← All Articles</a>
  </nav>

  <div class="placeholder">
    <div class="placeholder-label">Article</div>
    <h1 class="placeholder-title">Coming Soon</h1>
    <p class="placeholder-sub">This article is being updated and will be available shortly.</p>
    <a href="/blog/" class="btn btn-secondary">← Back to Blog</a>
  </div>

  <footer>
    <p>© 2026 Brij Mohan · bmdayal.github.io</p>
  </footer>

</body>
</html>
